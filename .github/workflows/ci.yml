name: CI

on:
  pull_request:
    branches: [main]

# Least-privilege default for GITHUB_TOKEN. These jobs only read the repo
# (checkout, build, validate); none need write scopes. Override per-job if that
# ever changes.
permissions:
  contents: read

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check

  # Performance budget — enforces Core Web Vitals on every PR.
  # Lab metrics are diagnostic; CrUX field data is the true scoreboard once live.
  # See web.dev/articles/vitals for the "good" thresholds (LCP<=2.5s, CLS<=0.1);
  # INP has no lab equivalent, so we gate on Total Blocking Time as the proxy.
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Lighthouse CI (Core Web Vitals budget)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: website:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4

      - name: Validate Shared Env
        run: |
          cd terraform/environments/shared
          terraform init -backend=false
          terraform validate

      - name: Validate Dev Env
        run: |
          cd terraform/environments/dev
          terraform init -backend=false
          terraform validate

      - name: Validate Staging Env
        run: |
          cd terraform/environments/staging
          terraform init -backend=false
          terraform validate

      - name: Validate Production Env
        run: |
          cd terraform/environments/production
          terraform init -backend=false
          terraform validate
