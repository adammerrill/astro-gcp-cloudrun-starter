name: Deploy Dev

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_DEPLOY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker
        run: gcloud auth configure-docker ${{ vars.AR_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ vars.AR_REGION }}-docker.pkg.dev/${{ vars.SHARED_PROJECT }}/${{ vars.AR_REPO }}/website:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        env:
          TF_VAR_project_id: ${{ vars.PROJECT_ID }}
          TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
          TF_VAR_shared_project_id: ${{ vars.SHARED_PROJECT }}
          TF_VAR_service_name: ${{ vars.SERVICE_NAME }}
          TF_VAR_region: ${{ vars.REGION }}
          TF_VAR_create_project: "false"
          TF_VAR_billing_account_id: ${{ vars.BILLING_ACCOUNT_ID }}
        run: |
          cd terraform/environments/dev
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=dev"
          terraform apply -auto-approve \
            -var="image=${{ vars.AR_REGION }}-docker.pkg.dev/${{ vars.SHARED_PROJECT }}/${{ vars.AR_REPO }}/website:${{ github.sha }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.SERVICE_NAME }}
          image: ${{ vars.AR_REGION }}-docker.pkg.dev/${{ vars.SHARED_PROJECT }}/${{ vars.AR_REPO }}/website:${{ github.sha }}
          region: ${{ vars.REGION }}
          project_id: ${{ vars.PROJECT_ID }}

      - name: Smoke Test
        run: |
          URL=$(gcloud run services describe ${{ vars.SERVICE_NAME }} --region=${{ vars.REGION }} --project=${{ vars.PROJECT_ID }} --format='value(status.url)')
          echo "Testing URL: $URL"
          curl -f "$URL" || exit 1
