name: Deploy Dev

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_DEPLOY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker
        run: gcloud auth configure-docker ${{ vars.AR_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ vars.AR_REGION }}-docker.pkg.dev/${{ vars.SHARED_PROJECT }}/${{ vars.AR_REPO }}/website:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

      # NOTE: Infrastructure (Cloud Run service, IAM, networking, etc.) is
      # provisioned by Terraform, run deliberately from a controlled
      # environment — NOT from this pipeline. This workflow only builds the
      # app image and deploys a new revision to the existing service. This
      # keeps the deploy pipeline least-privilege (it cannot alter infra)
      # and avoids running terraform apply with the deploy identity.

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.SERVICE_NAME }}
          image: ${{ vars.AR_REGION }}-docker.pkg.dev/${{ vars.SHARED_PROJECT }}/${{ vars.AR_REPO }}/website:${{ github.sha }}
          region: ${{ vars.REGION }}
          project_id: ${{ vars.PROJECT_ID }}

      - name: Smoke Test
        run: |
          URL=$(gcloud run services describe ${{ vars.SERVICE_NAME }} --region=${{ vars.REGION }} --project=${{ vars.PROJECT_ID }} --format='value(status.url)')
          echo "Testing URL: $URL"
          curl -f "$URL" || exit 1
