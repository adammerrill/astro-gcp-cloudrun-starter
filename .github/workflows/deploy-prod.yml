name: Deploy Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # manual redeploy (image tagged with the selected ref)

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_DEPLOY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Authenticate Docker
        run: gcloud auth configure-docker ${{ vars.AR_REGION }}-docker.pkg.dev --quiet

      # Production pulls the already built and tagged release image from Artifact Registry
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.SERVICE_NAME }}
          image: ${{ vars.AR_REGION }}-docker.pkg.dev/${{ vars.SHARED_PROJECT }}/${{ vars.AR_REPO }}/website:${{ github.ref_name }}
          region: ${{ vars.REGION }}
          project_id: ${{ vars.PROJECT_ID }}

      # Infrastructure is owned by Terraform, run deliberately from a controlled
      # environment — NOT from this pipeline. CI only ships a new image to the
      # existing service, keeping the deploy identity least-privilege.

      - name: Smoke Test
        run: |
          URL=$(gcloud run services describe ${{ vars.SERVICE_NAME }} --region=${{ vars.REGION }} --project=${{ vars.PROJECT_ID }} --format='value(status.url)')
          echo "Testing URL: $URL"
          curl -f "$URL" || exit 1
